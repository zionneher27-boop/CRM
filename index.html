<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="93media CRM"/>
<meta name="theme-color" content="#000"/>
<title>93 Dynamic Media CRM</title>
<link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.jpeg.jpg"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.jpeg.jpg"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
input,select,textarea{font-size:16px;font-family:inherit;outline:none;}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{background:#000;border-bottom:1px solid #1a1a1a;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;flex-direction:column;line-height:1;}
.logo-93{font-size:15px;font-weight:900;color:#fff;}
.logo-dynamic{font-size:6px;font-weight:800;color:#E91E8C;letter-spacing:2px;text-transform:uppercase;}
.logo-media{font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;}
.header-stats{display:flex;gap:14px;font-size:12px;color:#555;}
.header-stats span b{font-weight:800;}

#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#bottom-nav{display:flex;background:#0a0a0a;border-top:1px solid #1a1a1a;flex-shrink:0;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 10px;cursor:pointer;color:#555;font-size:9.5px;font-weight:700;letter-spacing:0.3px;position:relative;transition:color .15s;}
.bn-item.active{color:#E91E8C;}
.bn-icon{font-size:20px;line-height:1;}
.bn-badge{position:absolute;top:4px;right:calc(50% - 14px);background:#E91E8C;color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:8px;}

/* ── PAGES ── */
.page{display:none;padding:12px;}
.page.active{display:block;}

/* ── FILTERS ── */
.filters{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.fi{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;font-size:13px;color:#ccc;white-space:nowrap;min-width:0;flex-shrink:0;}
.fi option{background:#111;}
.search-fi{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:8px 12px;font-size:13px;color:#fff;min-width:160px;flex:1;}
.search-fi::placeholder{color:#444;}

/* ── LEAD CARDS ── */
.lead-card{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:13px;padding:14px;margin-bottom:10px;}
.lc-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px;}
.lc-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.lc-name{font-size:15px;font-weight:800;color:#fff;line-height:1.2;}
.lc-cat{font-size:11px;color:#555;margin-top:2px;}
.lc-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:700;margin-top:4px;}
.lc-info{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.lc-row{display:flex;gap:8px;align-items:flex-start;font-size:13px;}
.lc-lbl{font-size:10px;color:#444;font-weight:700;text-transform:uppercase;letter-spacing:.4px;min-width:65px;margin-top:1px;}
.lc-val{color:#ccc;flex:1;}
.call-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(233,30,140,.12);border:2px solid #E91E8C;border-radius:10px;padding:12px;color:#E91E8C;font-size:15px;font-weight:800;width:100%;margin-bottom:6px;text-decoration:none;}
.mobile-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:10px;color:#888;font-size:13px;font-weight:600;width:100%;margin-bottom:6px;text-decoration:none;}
.lc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid #1a1a1a;margin-top:4px;}
.lc-actions{display:flex;gap:8px;}
.action-btn{padding:7px;border-radius:7px;color:#555;background:#111;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:13px;}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 0 6px;}
.page-btn{background:#111;border:1px solid #2a2a2a;color:#ccc;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;}
.page-btn:disabled{opacity:.3;cursor:default;}
.page-info{font-size:12px;color:#555;}

/* ── CALL PANEL (fullscreen on mobile) ── */
#call-panel{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;}
#call-panel.open{display:flex;}
.cp-hdr{padding:14px 16px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;background:#0a0a0a;}
.cp-hdr-title{font-size:14px;font-weight:800;color:#fff;}
.cp-close{font-size:22px;color:#555;padding:4px 8px;}
.cp-body{flex:1;overflow-y:auto;padding:16px;}
.cp-name{font-size:20px;font-weight:900;color:#E91E8C;margin-bottom:2px;}
.cp-sub{font-size:12px;color:#555;margin-bottom:16px;}
.cp-field{margin-bottom:12px;}
.cp-field-lbl{font-size:9.5px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.cp-field-val{font-size:14px;color:#ddd;}
.cp-divider{height:1px;background:#1a1a1a;margin:14px 0;}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.status-btn{padding:10px 8px;border-radius:9px;font-size:12px;font-weight:700;border:2px solid #222;color:#555;background:transparent;transition:all .15s;text-align:center;}
.status-btn.selected{border-color:var(--c);color:var(--c);background:var(--bg);}
.cp-notes-lbl{font-size:9.5px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.cp-notes textarea{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:9px;padding:10px 12px;font-size:14px;color:#fff;min-height:90px;resize:none;display:block;}
.cp-notes textarea:focus{border-color:#E91E8C;}
.cp-nav{padding:12px 16px;border-top:1px solid #1a1a1a;display:flex;gap:8px;background:#0a0a0a;}
.cp-nav-btn{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:800;text-align:center;}
.cp-save{background:#E91E8C;color:#fff;}
.cp-next{background:#1a1a1a;color:#ccc;border:1px solid #2a2a2a;}
.cp-prev{background:#111;color:#666;border:1px solid #1a1a1a;flex:0 0 auto;padding:12px 16px;}

/* ── DASHBOARD ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.kpi{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#E91E8C;}
.kpi-lbl{font-size:9px;color:#444;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.kpi-val{font-size:26px;font-weight:900;color:#fff;margin:5px 0 2px;letter-spacing:-1px;}
.kpi-sub{font-size:11px;color:#444;}
.kpi-5{grid-column:1/-1;}
.section-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;margin-bottom:12px;}
.section-hdr{padding:11px 14px;border-bottom:1px solid #1a1a1a;font-size:13px;font-weight:700;color:#fff;}
.section-body{padding:12px 14px;}
.prog-row{margin-bottom:10px;}
.prog-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;}
.prog-label{color:#888;}
.prog-val{font-weight:700;}
.prog-bar{height:4px;background:#111;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s;}
</style>
</head>

  <!-- CONTENT -->

        </select>
        <select class="fi" id="filter-city" onchange="filterLeads()">

          <option value="Offenbach">Offenbach</option>

      </div>
      <div id="leads-list"></div>
      <div class="pagination" id="pagination"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">

      <span class="bn-icon">📊</span>
      <span>Dashboard</span>
    </div>
    <div class="bn-item" onclick="showPage('leads')" id="bn-leads">
      <span class="bn-icon">🍽️</span>
      <span>Gastro Leads</span>
      <span class="bn-badge" id="bn-badge" style="display:none"></span>
    </div>
    <div class="bn-item" style="cursor:default;">
      <div style="width:30px;height:30px;border-radius:50%;background:#E91E8C;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;margin:0 auto 2px;">NN</div>
      <span>N. Neher</span>
    </div>
  </div>
</div>

<!-- CALL PANEL -->
<div id="call-panel">
  <div class="cp-hdr">
    <span class="cp-hdr-title">📞 Anruf-Modus</span>
    <button class="cp-close" onclick="closeCallPanel()">✕</button>
  </div>
  <div class="cp-body">
    <div class="cp-name" id="cp-name"></div>
    <div class="cp-sub" id="cp-sub"></div>
    <div class="cp-field">
      <div class="cp-field-lbl">Ansprechpartner</div>
      <div class="cp-field-val" id="cp-contact"></div>
    </div>
    <div class="cp-field" id="cp-phone-field"></div>
    <div class="cp-field">
      <div class="cp-field-lbl">Adresse</div>
      <div class="cp-field-val" id="cp-address"></div>
    </div>
    <div class="cp-field" id="cp-website-field"></div>
    <div class="cp-divider"></div>
    <div style="font-size:10px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">Status nach dem Anruf</div>
    <div class="status-grid" id="status-grid"></div>
    <div class="cp-divider"></div>
    <div class="cp-notes-lbl">Notizen</div>
    <div class="cp-notes">
      <textarea id="cp-notes-input" placeholder="Gesprächsnotizen, nächste Schritte..."></textarea>
    </div>
  </div>
  <div class="cp-nav">
    <button class="cp-nav-btn cp-prev" onclick="prevLead()">←</button>
    <button class="cp-nav-btn cp-save" onclick="saveAndClose()">💾 Speichern</button>
    <button class="cp-nav-btn cp-next" onclick="saveAndNext()">Weiter →</button>
  </div>
</div>

const CALL_STATUSES = [
  {id:"nicht_kontaktiert", label:"Nicht kontaktiert", color:"#555",    bg:"rgba(100,100,100,.15)"},
  {id:"angerufen",         label:"Angerufen",         color:"#3B82F6", bg:"rgba(59,130,246,.15)"},
  {id:"gf_nicht_erreicht", label:"GF nicht erreicht", color:"#F59E0B", bg:"rgba(245,158,11,.15)"},
  {id:"nicht_erreicht",    label:"Nicht erreicht",    color:"#8B5CF6", bg:"rgba(139,92,246,.15)"},
  {id:"kein_bedarf",       label:"Kein Bedarf",       color:"#EF4444", bg:"rgba(239,68,68,.15)"},
  {id:"termin",            label:"Termin / Interesse", color:"#E91E8C", bg:"rgba(233,30,140,.12)"},
];

const COLORS = ["#E91E8C","#C4186F","#ff4da6","#b5158a","#e0559a","#ff69b4","#c71585","#db1083"];
const initials = n => n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const avatarColor = n => COLORS[n.charCodeAt(0) % COLORS.length];

// ── STATE ─────────────────────────────────────────────
let leads = LEADS_RAW.map(l => ({...l}));
let filteredLeads = [...leads];
let currentPage = 0;
const PER_PAGE = 20;
let callIdx = null;
let cpStatus = "";
let cpNotes = "";

// ── UTILS ─────────────────────────────────────────────
function getStatus(id) { return CALL_STATUSES.find(s=>s.id===id) || CALL_STATUSES[0]; }
function save() { try { localStorage.setItem('crm_leads', JSON.stringify(leads)); } catch(e){} }
function load() { try { const d=localStorage.getItem('crm_leads'); if(d) leads=JSON.parse(d); } catch(e){} }

// ── NAV ───────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('bn-'+name).classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='leads') renderLeads();
}

// ── FILTER & RENDER LEADS ─────────────────────────────
function filterLeads() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const st = document.getElementById('filter-status').value;
  const city = document.getElementById('filter-city').value;
  filteredLeads = leads.filter(l => {
    const mq = !q || l.name.toLowerCase().includes(q) || (l.phone&&l.phone.includes(q)) || (l.contact&&l.contact.toLowerCase().includes(q)) || (l.district&&l.district.toLowerCase().includes(q));
    const ms = !st || l.callStatus === st;
    const mc = !city || l.city.includes(city);
    return mq && ms && mc;
  });
  currentPage = 0;
  renderLeads();
}

function renderLeads() {
  const total = filteredLeads.length;
  const pages = Math.ceil(total / PER_PAGE);
  const slice = filteredLeads.slice(currentPage * PER_PAGE, (currentPage+1) * PER_PAGE);
  const list = document.getElementById('leads-list');

  if(slice.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:50px;color:#333;font-size:14px;">Keine Leads gefunden</div>';
  } else {
    list.innerHTML = slice.map((l, i) => {
      const cs = getStatus(l.callStatus);
      const av = avatarColor(l.name);
      const realIdx = currentPage * PER_PAGE + i;
      const hasPhone = l.phone && l.phone !== '';
      const hasContact = l.contact && l.contact !== 'n.v.' && l.contact !== '';
      return `
        <div class="lead-card">
          <div class="lc-top">
            <div class="lc-av" style="background:${av}">${initials(l.name)}</div>
            <div style="flex:1;min-width:0;">
              <div class="lc-name">${l.name}</div>
              <div class="lc-cat">${l.category}${l.district?' · '+l.district:''}</div>
              <span class="lc-badge" style="background:${cs.bg};color:${cs.color}">${cs.label}</span>
            </div>
          </div>
          <div class="lc-info">
            ${hasContact ? `<div class="lc-row"><span class="lc-lbl">👤 Kontakt</span><span class="lc-val" style="color:#fff;font-weight:700">${l.contact}${l.role?' <span style="color:#555;font-weight:400;font-size:11px">· '+l.role+'</span>':''}</span></div>` : ''}
            ${l.street ? `<div class="lc-row"><span class="lc-lbl">📍 Ort</span><span class="lc-val">${l.street}${l.plz?' , '+l.plz:''}</span></div>` : ''}
            ${l.notes ? `<div class="lc-row"><span class="lc-lbl">📝 Notiz</span><span class="lc-val" style="color:#E91E8C;font-size:12px">${l.notes}</span></div>` : ''}
          </div>
          ${hasPhone
            ? `<a href="tel:${l.phone.replace(/\s/g,'')}" class="call-btn" onclick="openCallPanel(${realIdx})">
                <span style="font-size:20px">📞</span> ${l.phone}
               </a>`
            : `<button class="call-btn" style="opacity:.35;cursor:default">Keine Nummer hinterlegt</button>`
          }
          ${l.mobile ? `<a href="tel:${l.mobile.replace(/\s/g,'')}" class="mobile-btn"><span>📱</span> ${l.mobile}</a>` : ''}
          <div class="lc-footer">
            ${l.website ? `<a href="https://${l.website}" target="_blank" style="font-size:11px;color:#E91E8C">${l.website}</a>` : '<span></span>'}
            <button class="action-btn" style="color:#E91E8C;border-color:#E91E8C" onclick="openCallPanel(${realIdx})">✏️ Status</button>
          </div>
        </div>`;
    }).join('');
  }

  // Pagination
  const pag = document.getElementById('pagination');
  if(pages <= 1) { pag.innerHTML=''; return; }
  pag.innerHTML = `
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>← Zurück</button>
    <span class="page-info">Seite ${currentPage+1} / ${pages} (${total})</span>
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages-1?'disabled':''}>Weiter →</button>`;

  updateHeader();
}

function goPage(p) { currentPage = p; renderLeads(); document.getElementById('content').scrollTo(0,0); }

// ── CALL PANEL ────────────────────────────────────────
function openCallPanel(idx) {
  callIdx = idx;
  const l = filteredLeads[idx];
  cpStatus = l.callStatus || 'nicht_kontaktiert';
  cpNotes = l.notes || '';
  renderCallPanel(l);
  document.getElementById('call-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderCallPanel(l) {
  document.getElementById('cp-name').textContent = l.name;
  document.getElementById('cp-sub').textContent = (l.category||'') + (l.district?' · '+l.district:'') + (l.city?' · '+l.city:'');
  document.getElementById('cp-contact').innerHTML = l.contact && l.contact !== 'n.v.'
    ? `<strong style="color:#fff">${l.contact}</strong>${l.role?' <span style="color:#555;font-size:12px">· '+l.role+'</span>':''}` : '<span style="color:#444">Nicht bekannt</span>';
  document.getElementById('cp-address').textContent = [l.street, l.plz, l.city].filter(Boolean).join(', ') || '—';

  const phoneField = document.getElementById('cp-phone-field');
  if(l.phone) {
    phoneField.innerHTML = `<div class="cp-field-lbl">Telefon</div>
      <a href="tel:${l.phone.replace(/\s/g,'')}" style="display:flex;align-items:center;gap:10px;background:rgba(233,30,140,.1);border:2px solid #E91E8C;border-radius:10px;padding:12px;color:#E91E8C;font-size:16px;font-weight:800;text-decoration:none;margin-top:4px;">
        📞 ${l.phone}
      </a>
      ${l.mobile ? `<a href="tel:${l.mobile.replace(/\s/g,'')}" style="display:flex;align-items:center;gap:8px;background:#111;border:1px solid #2a2a2a;border-radius:9px;padding:10px;color:#888;font-size:14px;font-weight:600;text-decoration:none;margin-top:6px;">📱 ${l.mobile}</a>` : ''}`;
  } else {
    phoneField.innerHTML = '<div class="cp-field-lbl">Telefon</div><div style="color:#444;font-size:13px;padding:8px 0">Nicht hinterlegt – bitte recherchieren</div>';
  }

  const webField = document.getElementById('cp-website-field');
  webField.innerHTML = l.website
    ? `<div class="cp-field-lbl">Website</div><a href="https://${l.website}" target="_blank" style="color:#E91E8C;font-size:13px">${l.website}</a>` : '';

  // Status grid
  const grid = document.getElementById('status-grid');
  grid.innerHTML = CALL_STATUSES.map(s => `
    <button class="status-btn ${cpStatus===s.id?'selected':''}"
      style="--c:${s.color};--bg:${s.bg};${cpStatus===s.id?'border-color:'+s.color+';color:'+s.color+';background:'+s.bg:''}"
      onclick="selectStatus('${s.id}')">${s.label}</button>`).join('');

  document.getElementById('cp-notes-input').value = cpNotes;
}

function selectStatus(id) {
  cpStatus = id;
  const l = filteredLeads[callIdx];
  const grid = document.getElementById('status-grid');
  grid.innerHTML = CALL_STATUSES.map(s => `
    <button class="status-btn ${cpStatus===s.id?'selected':''}"
      style="--c:${s.color};--bg:${s.bg};${cpStatus===s.id?'border-color:'+s.color+';color:'+s.color+';background:'+s.bg:''}"
      onclick="selectStatus('${s.id}')">${s.label}</button>`).join('');
}

function saveCurrentCall() {
  if(callIdx === null) return;
  const l = filteredLeads[callIdx];
  cpNotes = document.getElementById('cp-notes-input').value;
  const masterIdx = leads.findIndex(x => x.id === l.id);
  if(masterIdx !== -1) {
    leads[masterIdx].callStatus = cpStatus;
    leads[masterIdx].notes = cpNotes;
    leads[masterIdx].lastContact = new Date().toISOString().slice(0,10);
    filteredLeads[callIdx] = {...leads[masterIdx]};
  }
  save();
  updateHeader();
}

function saveAndClose() {
  saveCurrentCall();
  closeCallPanel();
  renderLeads();
}

function saveAndNext() {
  saveCurrentCall();
  cpNotes = ''; // clear notes for next lead
  if(callIdx < filteredLeads.length - 1) {
    callIdx++;
    const l = filteredLeads[callIdx];
    cpStatus = l.callStatus || 'nicht_kontaktiert';
    cpNotes = l.notes || '';
    renderCallPanel(l);
  } else {
    closeCallPanel();
    renderLeads();
  }
}

function prevLead() {
  saveCurrentCall();
  cpNotes = '';
  if(callIdx > 0) {
    callIdx--;
    const l = filteredLeads[callIdx];
    cpStatus = l.callStatus || 'nicht_kontaktiert';
    cpNotes = l.notes || '';
    renderCallPanel(l);
  }
}

function closeCallPanel() {
  document.getElementById('call-panel').classList.remove('open');
  document.body.style.overflow = '';
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard() {
  const total = leads.length;
  const kontaktiert = leads.filter(l=>l.callStatus!=='nicht_kontaktiert').length;
  const termine = leads.filter(l=>l.callStatus==='termin').length;
  const keinBedarf = leads.filter(l=>l.callStatus==='kein_bedarf').length;
  const nichtErreicht = leads.filter(l=>l.callStatus==='nicht_erreicht').length;

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi"><div class="kpi-lbl">Leads gesamt</div><div class="kpi-val">${total}</div><div class="kpi-sub">Frankfurt & Offenbach</div></div>
    <div class="kpi"><div class="kpi-lbl">Kontaktiert</div><div class="kpi-val">${kontaktiert}</div><div class="kpi-sub">${Math.round(kontaktiert/total*100)}% der Liste</div></div>
    <div class="kpi"><div class="kpi-lbl">Termine</div><div class="kpi-val" style="color:#E91E8C">${termine}</div><div class="kpi-sub">Mit Interesse</div></div>
    <div class="kpi"><div class="kpi-lbl">Kein Bedarf</div><div class="kpi-val" style="color:#EF4444">${keinBedarf}</div><div class="kpi-sub">Abgehakt</div></div>
    <div class="kpi kpi-5"><div class="kpi-lbl">Nicht erreicht</div><div class="kpi-val">${nichtErreicht}</div><div class="kpi-sub">Nochmal anrufen</div></div>`;

  const chart = document.getElementById('status-chart');
  chart.innerHTML = CALL_STATUSES.map(s => {
    const count = leads.filter(l=>l.callStatus===s.id).length;
    const pct = total>0 ? Math.round(count/total*100) : 0;
    return `<div class="prog-row">
      <div class="prog-top"><span class="prog-label">${s.label}</span><span class="prog-val" style="color:${s.color}">${count}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${s.color}"></div></div>
    </div>`;
  }).join('');
}

// ── HEADER ────────────────────────────────────────────
function updateHeader() {
  const kontaktiert = leads.filter(l=>l.callStatus!=='nicht_kontaktiert').length;
  const termine = leads.filter(l=>l.callStatus==='termin').length;
  const offen = leads.filter(l=>l.callStatus==='nicht_kontaktiert').length;
  document.getElementById('h-kontaktiert').textContent = kontaktiert;
  document.getElementById('h-termine').textContent = termine;
  document.getElementById('h-offen').textContent = offen;
  const badge = document.getElementById('bn-badge');
  if(offen > 0) { badge.textContent = offen; badge.style.display = 'block'; }
  else { badge.style.display = 'none'; }
}

// ── INIT ──────────────────────────────────────────────
load();
filterLeads();
updateHeader();
</script>
</body>
</html>
