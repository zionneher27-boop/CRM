const CSS = `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
input,textarea,select{outline:none;font-family:inherit;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}

.root{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:220px;min-width:220px;background:#000;border-right:1px solid #222;display:flex;flex-direction:column;}
.sb-logo{padding:20px 16px 12px;display:flex;align-items:center;gap:12px;}
.sb-logo-icon{display:flex;flex-direction:column;align-items:center;line-height:1;flex-shrink:0;}
.sb-logo-93{font-size:20px;font-weight:900;color:#fff;letter-spacing:-1px;}
.sb-logo-dynamic{font-size:7px;font-weight:800;color:#E91E8C;letter-spacing:2px;text-transform:uppercase;margin:-2px 0;}
.sb-logo-media{font-size:16px;font-weight:900;color:#fff;letter-spacing:0px;text-transform:uppercase;}
.sb-logo-text{margin-left:4px;}
.sb-logo-name{font-size:13px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.sb-logo-sub{font-size:10px;color:#555;font-weight:500;margin-top:1px;}
.sb-div{height:1px;background:#1a1a1a;margin:8px 14px;}
.sb-section{padding:0 8px 6px;}
.sb-label{font-size:9px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;padding:4px 8px 5px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:6px;font-size:13px;font-weight:500;color:#666;cursor:pointer;transition:all 0.12s;margin-bottom:2px;}
.sb-item:hover{background:#111;color:#fff;}
.sb-item.active{background:rgba(233,30,140,0.12);color:#E91E8C;border-left:2px solid #E91E8C;}
.sb-badge{margin-left:auto;background:#E91E8C;color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:8px;}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid #1a1a1a;}
.sb-user{display:flex;align-items:center;gap:9px;}
.sb-av{width:30px;height:30px;border-radius:50%;background:#E91E8C;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-uname{font-size:12.5px;font-weight:700;color:#fff;}
.sb-urole{font-size:10.5px;color:#555;}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;}
.topbar{background:#000;border-bottom:1px solid #1a1a1a;padding:11px 22px;display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.tb-stats{margin-left:auto;display:flex;gap:14px;font-size:11.5px;color:#444;}
.tb-stat{display:flex;align-items:center;gap:4px;}
.tb-stat b{color:#888;}

.content{flex:1;overflow-y:auto;padding:18px 22px;}

/* ── Cards ── */
.card{background:#0a0a0a;border:1px solid #222;border-radius:10px;}
.card-hdr{padding:12px 16px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:700;color:#fff;}

/* ── Buttons ── */
.btn-primary{display:flex;align-items:center;gap:5px;background:#E91E8C;color:#fff;padding:8px 16px;border-radius:7px;font-size:12.5px;font-weight:700;transition:background 0.12s;letter-spacing:0.2px;}
.btn-primary:hover{background:#C4186F;}
.btn-sec{display:flex;align-items:center;gap:5px;background:#111;color:#aaa;border:1px solid #333;padding:7px 12px;border-radius:7px;font-size:12.5px;font-weight:500;transition:background 0.12s;}
.btn-sec:hover{background:#1a1a1a;color:#fff;}
.btn-sm{padding:5px 10px;font-size:11.5px;font-weight:700;border-radius:5px;transition:all 0.12s;}

/* ── Filters ── */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.fi{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:6px 10px;font-size:12.5px;color:#ccc;min-width:130px;}
.fi option{background:#111;}
.search-box{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:7px 12px;font-size:12.5px;color:#fff;width:230px;}
.search-box::placeholder{color:#444;}
.search-box:focus{border-color:#E91E8C;}
.count-badge{margin-left:auto;font-size:11.5px;color:#555;}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:0.7px;border-bottom:1px solid #1a1a1a;white-space:nowrap;}
.tbl td{padding:10px 12px;font-size:12.5px;color:#bbb;border-bottom:1px solid #111;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(233,30,140,0.03);}

.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.lead-name{font-weight:700;color:#fff;font-size:13px;}
.lead-cat{font-size:11px;color:#555;margin-top:1px;}
.contact-info{font-size:11.5px;color:#888;}
.contact-role{font-size:10.5px;color:#444;margin-top:1px;}
.website-link{font-size:11px;color:#E91E8C;text-decoration:none;}
.website-link:hover{text-decoration:underline;}

.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.actions{display:flex;gap:4px;align-items:center;}
.act-btn{padding:4px;border-radius:5px;color:#444;transition:all 0.12s;display:flex;align-items:center;}
.act-btn:hover{background:#1a1a1a;color:#fff;}

/* ── Call Panel ── */
.call-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#0a0a0a;border-left:1px solid #222;z-index:50;display:flex;flex-direction:column;}
.cp-hdr{padding:14px 18px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.cp-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.cp-body{flex:1;overflow-y:auto;padding:16px 18px;}
.cp-name{font-size:18px;font-weight:900;color:#E91E8C;margin-bottom:2px;letter-spacing:-0.5px;}
.cp-cat{font-size:12px;color:#555;margin-bottom:14px;}
.cp-field{margin-bottom:10px;}
.cp-field-label{font-size:9.5px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:3px;}
.cp-field-value{font-size:13px;color:#ddd;}
.cp-field-value a{color:#E91E8C;text-decoration:none;}
.cp-field-value a:hover{text-decoration:underline;}
.cp-div{height:1px;background:#1a1a1a;margin:14px 0;}
.cp-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.cp-status-btn{padding:7px 8px;border-radius:7px;font-size:11.5px;font-weight:700;border:2px solid transparent;transition:all 0.12s;text-align:center;cursor:pointer;}
.cp-notes textarea{width:100%;background:#000;border:1px solid #2a2a2a;border-radius:7px;padding:8px 10px;font-size:12.5px;color:#ddd;min-height:90px;resize:vertical;}
.cp-notes textarea:focus{border-color:#E91E8C;}
.cp-nav{display:flex;gap:8px;padding:12px 18px;border-top:1px solid #1a1a1a;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);}
.modal{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:12px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;}
.modal-hdr{padding:16px 20px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:800;color:#fff;}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}
.modal-ftr{padding:12px 20px;border-top:1px solid #1a1a1a;display:flex;justify-content:flex-end;gap:8px;}

.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.5px;}
.fi2{background:#000;border:1px solid #2a2a2a;border-radius:7px;padding:8px 11px;font-size:13px;color:#fff;width:100%;transition:border-color 0.12s;}
.fi2:focus{border-color:#E91E8C;}
.fi2::placeholder{color:#333;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
textarea.fi2{resize:vertical;min-height:70px;}

/* ── KPI Grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#E91E8C;}
.kpi-lbl{font-size:9.5px;color:#444;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;}
.kpi-val{font-size:24px;font-weight:900;color:#fff;margin:6px 0 3px;letter-spacing:-1px;}
.kpi-sub{font-size:11px;color:#444;}

/* ── Progress ── */
.progress-bar{height:3px;border-radius:2px;background:#111;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s;}

/* ── Rating ── */
.rating-star{color:#E91E8C;font-size:11px;}

/* ── Empty ── */
.empty{text-align:center;padding:50px;color:#333;font-size:13px;}
`;

function CallStatusBadge({status}) {
  const s = CALL_STATUSES.find(x=>x.id===status) || CALL_STATUSES[0];
  return <span className="badge" style={{background:s.bg,color:s.color}}>{s.label}</span>;
}

function LeadAvatar({name}) {
  return <div className="av" style={{background:avatarColor(name)}}>{initials(name)}</div>;
}

function CloseIcon() { return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>; }
function PhoneIcon() { return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.15 13a19.79 19.79 0 01-3.07-8.67A2 2 0 013.07 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0121 17l.92-.08z"/></svg>; }
function EditIcon() { return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>; }
function PlusIcon() { return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>; }
function ChevronIcon({dir="right"}) {
  const r = {right:"0",left:"180deg",up:"270deg",down:"90deg"}[dir]||"0";
  return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{transform:`rotate(${r})`}}><path d="M9 18l6-6-6-6"/></svg>;
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function Dashboard({leads}) {
  const total = leads.length;
  const byStatus = CALL_STATUSES.map(s=>({...s,count:leads.filter(l=>l.callStatus===s.id).length}));
  const converted = leads.filter(l=>l.callStatus==="kunde").length;
  const termin = leads.filter(l=>l.callStatus==="termin").length;
  const contacted = leads.filter(l=>l.callStatus!=="nicht_kontaktiert").length;

  const byDistrict = DISTRICTS.map(d=>({d,n:leads.filter(l=>l.district===d).length})).sort((a,b)=>b.n-a.n).slice(0,8);
  const maxD = Math.max(...byDistrict.map(x=>x.n));

  return (
    <div>
      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-lbl">Leads gesamt</div><div className="kpi-val">{total}</div><div className="kpi-sub">Frankfurt & Umgebung</div></div>
        <div className="kpi"><div className="kpi-lbl">Kontaktiert</div><div className="kpi-val">{contacted}</div><div className="kpi-sub">{Math.round(contacted/total*100)}% der Liste</div></div>
        <div className="kpi"><div className="kpi-lbl">Termine</div><div className="kpi-val" style={{color:"#10B981"}}>{termin}</div><div className="kpi-sub">Vereinbarte Gespräche</div></div>
        <div className="kpi"><div className="kpi-lbl">Kunden</div><div className="kpi-val" style={{color:"#E91E8C"}}>{converted}</div><div className="kpi-sub">Erfolgreich konvertiert</div></div>
        <div className="kpi"><div className="kpi-lbl">Kein Interesse</div><div className="kpi-val" style={{color:"#EF4444"}}>{leads.filter(l=>l.callStatus==="kein_interesse").length}</div><div className="kpi-sub">Aus Liste entfernen</div></div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card">
          <div className="card-hdr"><span className="card-title">Anruf-Status Übersicht</span></div>
          <div style={{padding:"12px 16px"}}>
            {byStatus.map(s=>(
              <div key={s.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#94A3B8"}}>{s.label}</span>
                  <span style={{fontSize:12,fontWeight:700,color:s.color}}>{s.count}</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:total>0?`${s.count/total*100}%`:"0%",background:s.color}} />
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-hdr"><span className="card-title">Top Stadtteile</span></div>
          <div style={{padding:"12px 16px"}}>
            {byDistrict.map(({d,n})=>(
              <div key={d} style={{marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color:"#94A3B8"}}>{d}</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#E2E8F0"}}>{n}</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${n/maxD*100}%`,background:"#E91E8C"}} />
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-hdr"><span className="card-title">Nach Kategorie</span></div>
          <div style={{padding:"8px 16px"}}>
            {CATEGORIES.map(cat=>{
              const n = leads.filter(l=>l.category===cat).length;
              return (
                <div key={cat} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1A2535"}}>
                  <span style={{fontSize:12.5,color:"#94A3B8"}}>{cat}</span>
                  <span style={{fontSize:12,fontWeight:600,color:"#CBD5E1"}}>{n}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card">
          <div className="card-hdr"><span className="card-title">Nach Segment</span></div>
          <div style={{padding:"8px 16px"}}>
            {SEGMENTS.map(seg=>{
              const n = leads.filter(l=>l.segment===seg).length;
              return (
                <div key={seg} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1A2535"}}>
                  <span style={{fontSize:12.5,color:"#94A3B8"}}>{seg}</span>
                  <span style={{fontSize:12,fontWeight:600,color:"#CBD5E1"}}>{n}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Call Panel ────────────────────────────────────────────────────────────
function CallPanel({lead, leads, onClose, onUpdate, onNext, onPrev}) {
  const [notes, setNotes] = useState(lead.notes||"");
  const [callStatus, setCallStatus] = useState(lead.callStatus||"nicht_kontaktiert");

  const save = () => {
    onUpdate(lead.id, {callStatus, notes, lastContact: new Date().toISOString().slice(0,10)});
    onClose();
  };

  const saveAndNext = () => {
    onUpdate(lead.id, {callStatus, notes, lastContact: new Date().toISOString().slice(0,10)});
    onNext();
  };

  return (
    <div className="call-panel">
      <div className="cp-hdr">
        <span className="cp-title">📞 Anruf-Modus</span>
        <button className="act-btn" onClick={save}><CloseIcon /></button>
      </div>
      <div className="cp-body">
        <div className="cp-name">{lead.name}</div>
        <div className="cp-cat">{lead.category} · {lead.district}</div>

        <div className="cp-field"><div className="cp-field-label">Ansprechpartner</div>
          <div className="cp-field-value" style={{fontWeight:600}}>{lead.contact}</div>
          <div className="cp-field-value" style={{fontSize:11,color:"#64748B"}}>{lead.role}</div>
        </div>
        <div className="cp-field"><div className="cp-field-label">Telefon</div>
          {lead.phone ? (
            <a href={`tel:${lead.phone.replace(/\s/g,'')}`} style={{fontSize:16,fontWeight:800,color:"#E91E8C",textDecoration:"none",display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"rgba(233,30,140,0.1)",border:"2px solid #E91E8C",borderRadius:10,marginBottom:6}}>
              <span style={{fontSize:20}}>📞</span> {lead.phone}
            </a>
          ) : <div style={{color:"#444",fontSize:13}}>Keine Nummer hinterlegt</div>}
          {lead.mobile && (
            <a href={`tel:${lead.mobile.replace(/\s/g,'')}`} style={{fontSize:14,fontWeight:700,color:"#aaa",textDecoration:"none",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#111",border:"1px solid #333",borderRadius:8}}>
              <span style={{fontSize:16}}>📱</span> {lead.mobile}
            </a>
          )}
        </div>
        <div className="cp-field"><div className="cp-field-label">Adresse</div>
          <div className="cp-field-value">{lead.street}, {lead.plz} {lead.city}</div>
        </div>
        <div className="cp-field"><div className="cp-field-label">Website</div>
          <div className="cp-field-value"><a href={`https://${lead.website}`} target="_blank" rel="noopener noreferrer">{lead.website}</a></div>
        </div>
        <div className="cp-field"><div className="cp-field-label">E-Mail</div>
          <div className="cp-field-value"><a href={`mailto:${lead.email}`}>{lead.email}</a></div>
        </div>
        {lead.rating && <div className="cp-field"><div className="cp-field-label">Bewertung</div>
          <div className="cp-field-value"><span className="rating-star">★</span> {lead.rating} · {lead.size}</div>
        </div>}

        <div className="cp-div" />
        <div style={{marginBottom:10,fontSize:11.5,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.5px"}}>Anruf-Status setzen</div>
        <div className="cp-status-grid">
          {CALL_STATUSES.map(s=>(
            <button key={s.id} className="cp-status-btn"
              style={{background:callStatus===s.id?s.bg:"transparent",borderColor:callStatus===s.id?s.color:"#334155",color:callStatus===s.id?s.color:"#64748B"}}
              onClick={()=>setCallStatus(s.id)}>{s.label}</button>
          ))}
        </div>

        <div className="cp-div" />
        <div style={{marginBottom:8,fontSize:11.5,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.5px"}}>Notizen</div>
        <div className="cp-notes">
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Gesprächsnotizen, Interessen, nächste Schritte…" />
        </div>
      </div>
      <div className="cp-nav">
        <button className="btn-sec btn-sm" onClick={onPrev}><ChevronIcon dir="left" />&nbsp;Zurück</button>
        <button className="btn-primary btn-sm" style={{flex:1}} onClick={save}>Speichern</button>
        <button className="btn-primary btn-sm" onClick={saveAndNext}>Weiter&nbsp;<ChevronIcon dir="right" /></button>
      </div>
    </div>
  );
}

// ── Leads Table ───────────────────────────────────────────────────────────
function LeadsTable({leads, setLeads}) {
  const [search, setSearch] = useState("");
  const [fDistrict, setFDistrict] = useState("all");
  const [fCategory, setFCategory] = useState("all");
  const [fCallStatus, setFCallStatus] = useState("all");
  const [fSegment, setFSegment] = useState("all");
  const [callPanelIdx, setCallPanelIdx] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [addModal, setAddModal] = useState(false);
  const [form, setForm] = useState({});
  const [page, setPage] = useState(0);
  const PER = 40;

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return leads.filter(l=>{
      const mq = !q || l.name.toLowerCase().includes(q) || l.contact.toLowerCase().includes(q) || l.phone.includes(q) || l.district.toLowerCase().includes(q) || l.category.toLowerCase().includes(q);
      const md = fDistrict==="all" || l.district===fDistrict;
      const mc = fCategory==="all" || l.category===fCategory;
      const ms = fCallStatus==="all" || l.callStatus===fCallStatus;
      const mg = fSegment==="all" || l.segment===fSegment;
      return mq&&md&&mc&&ms&&mg;
    });
  }, [leads, search, fDistrict, fCategory, fCallStatus, fSegment]);

  const pages = Math.ceil(filtered.length/PER);
  const visible = filtered.slice(page*PER, (page+1)*PER);

  const updateLead = (id, updates) => setLeads(prev=>prev.map(l=>l.id===id?{...l,...updates}:l));
  const deleteLead = (id) => setLeads(prev=>prev.filter(l=>l.id!==id));

  const openCall = (idx) => { setCallPanelIdx(filtered.findIndex(l=>l.id===visible[idx].id)); };
  const callLead = filtered[callPanelIdx];
  const nextCall = () => setCallPanelIdx(i=>Math.min(i+1,filtered.length-1));
  const prevCall = () => setCallPanelIdx(i=>Math.max(i-1,0));

  const saveForm = () => {
    if (!form.name) return;
    if (addModal) setLeads(prev=>[{...form,id:uid(),callStatus:"nicht_kontaktiert",lastContact:"",createdAt:new Date().toISOString().slice(0,10)},...prev]);
    else setLeads(prev=>prev.map(l=>l.id===form.id?{...l,...form}:l));
    setEditModal(null); setAddModal(false);
  };

  const sf = v => setForm(f=>({...f,...v}));

  return (
    <div style={{paddingRight: callLead ? 390 : 0}}>
      {callLead && (
        <CallPanel lead={callLead} leads={filtered} onClose={()=>setCallPanelIdx(null)}
          onUpdate={(id,u)=>updateLead(id,u)} onNext={nextCall} onPrev={prevCall} />
      )}

      <div className="filters">
        <input className="search-box" placeholder="🔍 Suche Name, Telefon, Stadtteil…" value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} />
        <select className="fi" value={fCallStatus} onChange={e=>{setFCallStatus(e.target.value);setPage(0);}}>
          <option value="all">Alle Status</option>
          {CALL_STATUSES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
        <select className="fi" value={fDistrict} onChange={e=>{setFDistrict(e.target.value);setPage(0);}}>
          <option value="all">Alle Stadtteile</option>
          {DISTRICTS.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select className="fi" value={fCategory} onChange={e=>{setFCategory(e.target.value);setPage(0);}}>
          <option value="all">Alle Kategorien</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select className="fi" value={fSegment} onChange={e=>{setFSegment(e.target.value);setPage(0);}}>
          <option value="all">Alle Segmente</option>
          {SEGMENTS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <span className="count-badge">{filtered.length} Leads</span>
        <button className="btn-primary" onClick={()=>{setForm({name:"",category:"Restaurant",segment:"Casual Dining",contact:"",role:"Inhaber",phone:"",mobile:"",email:"",website:"",street:"",plz:"60311",city:"Frankfurt am Main",district:"Innenstadt",status:"lead",size:"1-5 MA",rating:null,notes:""});setAddModal(true);}}>
          <PlusIcon />&nbsp;Lead
        </button>
      </div>

      <div className="card">
        <table className="tbl">
          <thead>
            <tr>
              <th>#</th>
              <th>Betrieb</th>
              <th>Ansprechpartner</th>
              <th>Telefon</th>
              <th>Website</th>
              <th>Stadtteil</th>
              <th>Segment</th>
              <th>Bewertung</th>
              <th>Call-Status</th>
              <th>Letzte Kontakt</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {visible.length===0 && <tr><td colSpan={11} className="empty">Keine Leads gefunden</td></tr>}
            {visible.map((l,i)=>(
              <tr key={l.id}>
                <td style={{color:"#475569",fontSize:11}}>{page*PER+i+1}</td>
                <td>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <LeadAvatar name={l.name} />
                    <div>
                      <div className="lead-name">{l.name}</div>
                      <div className="lead-cat">{l.category}</div>
                    </div>
                  </div>
                </td>
                <td>
                  <div className="contact-info" style={{fontWeight:600,color:"#CBD5E1"}}>{l.contact}</div>
                  <div className="contact-role">{l.role}</div>
                </td>
                <td>
                  {l.phone ? (
                    <a href={`tel:${l.phone.replace(/\s/g,'')}`} style={{fontSize:12.5,color:"#E91E8C",fontWeight:700,textDecoration:"none",display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:12}}>📞</span>{l.phone}
                    </a>
                  ) : <span style={{color:"#333",fontSize:12}}>—</span>}
                  {l.mobile && <a href={`tel:${l.mobile.replace(/\s/g,'')}`} style={{fontSize:11,color:"#666",textDecoration:"none",display:"flex",alignItems:"center",gap:3,marginTop:2}}>📱 {l.mobile}</a>}
                </td>
                <td><a className="website-link" href={`https://${l.website}`} target="_blank" rel="noopener noreferrer">{l.website}</a></td>
                <td style={{fontSize:12,color:"#94A3B8"}}>{l.district}</td>
                <td><span className="badge" style={{background:"rgba(100,116,139,0.12)",color:"#94A3B8"}}>{l.segment}</span></td>
                <td style={{fontSize:12,color:"#F59E0B"}}>{l.rating ? `★ ${l.rating}` : "—"}</td>
                <td><CallStatusBadge status={l.callStatus} /></td>
                <td style={{fontSize:11,color:"#64748B"}}>{l.lastContact||"—"}</td>
                <td>
                  <div className="actions">
                    <button className="act-btn" title="Anrufen" style={{color:"#E91E8C",background:"rgba(233,30,140,0.08)",borderRadius:6,padding:5}} onClick={()=>openCall(i)}><PhoneIcon /></button>
                    <button className="act-btn" onClick={()=>{setForm({...l});setEditModal(l);}}><EditIcon /></button>
                    <button className="act-btn" style={{color:"#64748B"}} onClick={()=>deleteLead(l.id)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {pages > 1 && (
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:12}}>
          <button className="btn-sec btn-sm" disabled={page===0} onClick={()=>setPage(p=>p-1)}>← Zurück</button>
          <span style={{fontSize:12,color:"#64748B",alignSelf:"center"}}>Seite {page+1} / {pages}</span>
          <button className="btn-sec btn-sm" disabled={page===pages-1} onClick={()=>setPage(p=>p+1)}>Weiter →</button>
        </div>
      )}

      {(editModal||addModal) && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&(setEditModal(null),setAddModal(false))}>
          <div className="modal">
            <div className="modal-hdr">
              <span className="modal-title">{addModal?"Lead hinzufügen":"Lead bearbeiten"}</span>
              <button className="act-btn" onClick={()=>{setEditModal(null);setAddModal(false);}}><CloseIcon /></button>
            </div>
            <div className="modal-body">
              <div className="form-row">
                <div className="fg"><label className="fl">Betriebsname</label><input className="fi2" value={form.name||""} onChange={e=>sf({name:e.target.value})} placeholder="Restaurant zum Goldenen Hirsch" /></div>
                <div className="fg"><label className="fl">Kategorie</label>
                  <select className="fi2" value={form.category||""} onChange={e=>sf({category:e.target.value})}>
                    {CATEGORIES.map(c=><option key={c}>{c}</option>)}
                  </select></div>
              </div>
              <div className="form-row">
                <div className="fg"><label className="fl">Ansprechpartner</label><input className="fi2" value={form.contact||""} onChange={e=>sf({contact:e.target.value})} placeholder="Max Mustermann" /></div>
                <div className="fg"><label className="fl">Position</label><input className="fi2" value={form.role||""} onChange={e=>sf({role:e.target.value})} placeholder="Inhaber" /></div>
              </div>
              <div className="form-row">
                <div className="fg"><label className="fl">Telefon</label><input className="fi2" value={form.phone||""} onChange={e=>sf({phone:e.target.value})} placeholder="069 123 456" /></div>
                <div className="fg"><label className="fl">Mobil</label><input className="fi2" value={form.mobile||""} onChange={e=>sf({mobile:e.target.value})} placeholder="0151 123 456" /></div>
              </div>
              <div className="form-row">
                <div className="fg"><label className="fl">E-Mail</label><input className="fi2" type="email" value={form.email||""} onChange={e=>sf({email:e.target.value})} placeholder="info@restaurant.de" /></div>
                <div className="fg"><label className="fl">Website</label><input className="fi2" value={form.website||""} onChange={e=>sf({website:e.target.value})} placeholder="www.restaurant.de" /></div>
              </div>
              <div className="form-row">
                <div className="fg"><label className="fl">Straße</label><input className="fi2" value={form.street||""} onChange={e=>sf({street:e.target.value})} placeholder="Berger Straße 12" /></div>
                <div className="fg"><label className="fl">Stadtteil</label>
                  <select className="fi2" value={form.district||""} onChange={e=>sf({district:e.target.value})}>
                    {DISTRICTS.map(d=><option key={d}>{d}</option>)}
                  </select></div>
              </div>
              <div className="form-row">
                <div className="fg"><label className="fl">Segment</label>
                  <select className="fi2" value={form.segment||""} onChange={e=>sf({segment:e.target.value})}>
                    {SEGMENTS.map(s=><option key={s}>{s}</option>)}
                  </select></div>
                <div className="fg"><label className="fl">Größe</label>
                  <select className="fi2" value={form.size||""} onChange={e=>sf({size:e.target.value})}>
                    {["1-5 MA","6-15 MA","16-30 MA","31-50 MA","50+ MA"].map(s=><option key={s}>{s}</option>)}
                  </select></div>
              </div>
              <div className="fg"><label className="fl">Notizen</label><textarea className="fi2" value={form.notes||""} onChange={e=>sf({notes:e.target.value})} placeholder="Erste Eindrücke, Gesprächsthemen…" /></div>
            </div>
            <div className="modal-ftr">
              <button className="btn-sec" onClick={()=>{setEditModal(null);setAddModal(false);}}>Abbrechen</button>
              <button className="btn-primary" onClick={saveForm}>Speichern</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────
const NAV = [
  {id:"dashboard",label:"Dashboard",icon:"📊"},
  {id:"leads",label:"Gastro Leads",icon:"🍽️"},
];

function App() {
  const [page, setPage] = useState("leads");
  const [leads, setLeads] = useState(LEADS_DATA);

  const notKontaktiert = leads.filter(l=>l.callStatus==="nicht_kontaktiert").length;
  const termine = leads.filter(l=>l.callStatus==="termin").length;
  const kunden = leads.filter(l=>l.callStatus==="kunde").length;

  return (
    <>
      <style>{CSS}</style>
      <div className="root">
        <aside className="sidebar">
          <div className="sb-logo">
            <div className="sb-logo-icon">
              <span className="sb-logo-93">93</span>
              <span className="sb-logo-dynamic">DYNAMIC</span>
              <span className="sb-logo-media">MEDIA</span>
            </div>
          </div>
          <div className="sb-div" />
          <div className="sb-section">
            <div className="sb-label">Navigation</div>
            {NAV.map(n=>(
              <div key={n.id} className={`sb-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
                <span>{n.icon}</span>{n.label}
                {n.id==="leads" && notKontaktiert>0 && <span className="sb-badge">{notKontaktiert}</span>}
              </div>
            ))}
          </div>
          <div className="sb-div" />
          <div className="sb-section">
            <div className="sb-label">Quick Stats</div>
            <div style={{padding:"6px 10px"}}>
              <div style={{fontSize:11.5,color:"#64748B",marginBottom:6}}>📞 <span style={{color:"#CBD5E1",fontWeight:600}}>{leads.filter(l=>l.callStatus!=="nicht_kontaktiert").length}</span> kontaktiert</div>
              <div style={{fontSize:11.5,color:"#64748B",marginBottom:6}}>📅 <span style={{color:"#E91E8C",fontWeight:600}}>{termine}</span> Termine</div>
              <div style={{fontSize:11.5,color:"#64748B"}}>🏆 <span style={{color:"#E91E8C",fontWeight:600}}>{kunden}</span> Kunden</div>
            </div>
          </div>
          <div className="sb-footer">
            <div className="sb-user">
              <div className="sb-av">NN</div>
              <div><div className="sb-uname">N. Neher</div><div className="sb-urole">Geschäftsführer</div></div>
            </div>
          </div>
        </aside>

        <main className="main">
          <div className="topbar">
            <span className="topbar-title">{page==="dashboard"?"Dashboard":"Gastro Leads 1"}</span>
            <div className="tb-stats">
              <span className="tb-stat">🍽️ <b>{leads.length}</b> Betriebe</span>
              <span className="tb-stat">📞 <b style={{color:"#10B981"}}>{leads.filter(l=>l.callStatus==="termin").length}</b> Termine</span>
              <span className="tb-stat">🏆 <b style={{color:"#F97316"}}>{leads.filter(l=>l.callStatus==="kunde").length}</b> Kunden</span>
              <span className="tb-stat" style={{color:"#EF4444"}}>⏳ <b>{leads.filter(l=>l.callStatus==="nicht_kontaktiert").length}</b> offen</span>
            </div>
          </div>
          <div className="content">
            {page==="dashboard" && <Dashboard leads={leads} />}
            {page==="leads" && <LeadsTable leads={leads} setLeads={setLeads} />}
          </div>
        </main>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
